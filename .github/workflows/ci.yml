name: CI

on:
  push:
    branches: ["main"]
    tags-ignore: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: 테스트
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.26"]

    steps:
      - uses: actions/checkout@v6

      - name: Go ${{ matrix.go-version }} 설치
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: 의존성 설치
        run: go mod download

      - name: 빌드 확인
        run: go build ./...

      - name: 테스트 (커버리지 포함)
        run: go test ./... -coverprofile=coverage.out -timeout=180s

      - name: 커버리지 리포트
        run: go tool cover -func=coverage.out | tail -1

      - name: 커버리지 임계값 확인 (72%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep "^total:" | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          python3 -c "import sys; sys.exit(0 if float('${COVERAGE}') >= 72 else 1)" || (echo "Coverage ${COVERAGE}% is below 72% threshold" && exit 1)

  lint:
    name: 린트
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          install-mode: goinstall
          args: --timeout=5m

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.27.1
      - name: Run gosec
        run: gosec -exclude=G304,G204,G306 -exclude-dir=internal/comment/testdata ./...
