# 명령어 설명
cmd.root.short:
  other: "코드 품질 및 기준을 위한 Git 커밋 검사기"
cmd.root.long:
  other: |-
    git 저장소에서 커밋 메시지와 코드 주석 기준을 강제하는 도구입니다.
    lefthook, husky 등 git hook 관리자와 통합됩니다.
cmd.run.short:
  other: "추적된 모든 파일의 정책 준수 여부를 검사합니다"
cmd.run.long:
  other: |-
    git(git ls-files)이 추적하는 모든 파일을 읽어 다음을 검사합니다:
    - 바이너리 파일 감지
    - 파일 인코딩 (UTF-8)
    - 데이터 파일 lint (YAML, JSON/JSON5, XML)
    - .editorconfig 준수
    - 주석 언어 준수

    'diff'와 달리, 스테이징 여부와 관계없이 모든 파일을 검사합니다.
cmd.diff.short:
  other: "diff 의 정책 준수를 검사합니다 (CI 용 from..to 비교 지원)"
cmd.diff.long:
  other: |-
    git diff 와 호환되는 인자 형식으로 코드 정책을 검사합니다.

    인자 없으면 스테이지된 변경(HEAD ↔ index)을 검사합니다.
    그 외 비교는 git diff 와 동일하게 지정합니다:

      commit-checker diff                  # 기본: 스테이지된 변경
      commit-checker diff --staged         # 명시적 스테이지 (== --cached)
      commit-checker diff HEAD             # HEAD ↔ working tree (uncommitted 전체)
      commit-checker diff origin/main      # origin/main ↔ working tree
      commit-checker diff A B              # A ↔ B
      commit-checker diff A..B             # A ↔ B (range 표기)
      commit-checker diff A...B            # merge-base(A,B) ↔ B

    검사 항목:
    - 바이너리 파일 정책 (block/allow/lfs)
    - 파일 인코딩 (UTF-8)
    - 데이터 파일 lint (YAML, JSON/JSON5, XML)
    - .editorconfig 준수
    - 주석 언어 준수
    - append-only 경로 / 캐시 디렉터리 등
cmd.msg.short:
  other: "커밋 메시지 위반 사항을 검사합니다"
cmd.msg.long:
  other: |-
    커밋 메시지 파일을 읽어 다음을 검사합니다:
      - Co-authored-by: 트레일러 (AI 도구, 설정 가능)
      - 비표준 유니코드 공백 문자
      - ASCII와 유사한 모호한 유니코드 문자
      - 잘못된 UTF-8 바이트 시퀀스
      - 컨벤셔널 커밋 형식 (활성화 시)

    --fix 옵션 사용 시, 자동 수정 가능한 위반 사항(언어 검사 제외)이
    커밋 전에 파일 내에서 수정됩니다.
cmd.fix.short:
  other: "스테이지된 파일의 유니코드 이슈를 자동 수정합니다"
cmd.fix.long:
  other: |-
    스테이지된 파일에서 자동 수정 가능한 유니코드 이슈를 수정합니다.

    자동 수정 가능한 이슈:
      - 비표준 유니코드 공백 문자 (교체 또는 제거)
      - ASCII와 유사한 모호한 유니코드 문자 (ASCII로 교체)
      - 잘못된 UTF-8 바이트 시퀀스 (제거)

    수정된 파일은 자동으로 다시 스테이지됩니다.

    예시:
      commit-checker fix             # 스테이지된 파일 수정
      commit-checker fix --dry-run   # 변경하지 않고 수정 내용 미리 보기
cmd.clean.short:
  other: "빌드 산출물·캐시 디렉터리에서 미추적 파일을 정리합니다"
cmd.clean.long:
  other: |-
    현재 git 저장소를 스캔하여 빌드 산출물·캐시 디렉터리(node_modules, dist,
    build, target, __pycache__, .venv 등)를 찾습니다.

    부모 디렉터리 인디케이터(go.mod, package.json, Cargo.toml 등) 기반으로
    실제 캐시 디렉터리만 식별하므로 false positive 가 적습니다.

    git 추적 중인 파일은 절대 삭제하지 않습니다 — `git ls-files --others` 로
    미추적 파일만 대상으로 삼습니다.

    예시:
      commit-checker clean              # 발견 항목 출력 (dry-run)
      commit-checker clean --yes        # 미추적 파일 실제 삭제
cmd.clean.scanning:
  other: "스캔 중: {{.Path}}"
cmd.clean.no_cache_dirs:
  other: "캐시/빌드 디렉터리를 찾지 못했습니다."
cmd.clean.found_header:
  other: "{{.Count}}개의 캐시/빌드 디렉터리 발견 (총 {{.Size}}):"
cmd.clean.entry:
  other: "  {{.Path}}  ({{.Size}}{{.Tracked}})"
cmd.clean.entry_tracked:
  other: ", git 추적 파일 {{.Count}}개 ⚠"
cmd.clean.dry_run_hint:
  other: "\n--yes 플래그로 미추적 파일을 삭제할 수 있습니다."
cmd.clean.cleaned_summary:
  other: "{{.Size}} 정리됨 ({{.Count}}개 디렉터리)"
cmd.clean.not_in_repo:
  other: "git 저장소가 아닙니다: {{.Path}}"
cmd.push.short:
  other: "푸쉬될 커밋의 메시지를 검사합니다"
cmd.push.long:
  other: |-
    git pre-push 훅 형식의 stdin을 읽어 각 커밋 메시지를
    설정된 정책에 따라 검사합니다.

    lefthook, husky 등을 통해 git pre-push 훅으로 사용하세요:
      pre-push:
        commands:
          check-commits:
            run: commit-checker push

    또는 특정 범위를 직접 지정할 수 있습니다:
      commit-checker push --range origin/main..HEAD
cmd.validate.short:
  other: "설정 파일을 검증합니다"
cmd.validate.long:
  other: "설정 파일의 오류 및 잠재적 문제를 확인합니다."
cmd.init.short:
  other: "기본 설정 파일을 생성합니다"
cmd.init.long:
  other: |-
    현재 디렉터리에 기본 .commit-checker.yml 설정 파일을 생성합니다.

    --lang으로 로케일을 설정할 수 있습니다 (ko, en, ja, zh). 지정하지 않으면 시스템 로케일이 자동으로 감지됩니다.
    --force를 사용하면 기존 파일을 덮어씁니다.
cmd.migrate.short:
  other: "설정 파일을 최신 스키마로 마이그레이션합니다"
cmd.migrate.long:
  other: |-
    설정 파일의 스키마 버전을 감지하고 최신 형식으로 마이그레이션합니다.

    이전 필드 이름이 자동으로 이름 변경되고 더 이상 사용되지 않는 필드가 제거됩니다.
    마이그레이션 중에 주석과 형식이 유지됩니다.

    --dry-run을 사용하면 파일을 수정하지 않고 변경 사항을 미리 볼 수 있습니다.
cmd.analyze.short:
  other: "저장소를 분석하여 언어와 Lint 설정을 감지합니다"
cmd.analyze.long:
  other: |-
    현재 저장소를 스캔하여 사용된 프로그래밍 언어를 감지하고,
    기존 lint 설정을 확인하며, 권장 사항을 보고합니다.
cmd.version.short:
