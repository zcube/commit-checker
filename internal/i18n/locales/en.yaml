# command descriptions
cmd.root.short:
  other: "Git commit checker for code quality and standards"
cmd.root.long:
  other: |-
    A tool to enforce commit message and code comment standards in git repositories.
    Integrates with lefthook, husky, and other git hook managers.
cmd.run.short:
  other: "Check all tracked files for policy compliance"
cmd.run.long:
  other: |-
    Reads all files tracked by git (git ls-files) and checks:
    - binary file detection
    - file encoding (UTF-8)
    - data file lint (YAML, JSON/JSON5, XML)
    - .editorconfig compliance
    - comment language compliance

    Unlike 'diff', this command checks all files regardless of staged state.
cmd.diff.short:
  other: "Check a diff for policy compliance (CI-friendly from..to)"
cmd.diff.long:
  other: |-
    Check policy on a diff. Argument format mirrors `git diff`.

    Without arguments, checks staged changes (HEAD ↔ index). For other
    comparisons, use the same syntax as `git diff`:

      commit-checker diff                  # default: staged
      commit-checker diff --staged         # explicit (alias: --cached)
      commit-checker diff HEAD             # HEAD ↔ working tree
      commit-checker diff origin/main      # origin/main ↔ working tree
      commit-checker diff A B              # A ↔ B
      commit-checker diff A..B             # A ↔ B (range)
      commit-checker diff A...B            # merge-base(A,B) ↔ B

    Checks:
    - binary file policy (block/allow/lfs)
    - file encoding (UTF-8)
    - data file lint (YAML, JSON/JSON5, XML)
    - .editorconfig compliance
    - comment language compliance
    - append-only paths / cache directories, etc.
cmd.msg.short:
  other: "Check commit message for violations"
cmd.msg.long:
  other: |-
    Reads the commit message file and checks for:
      - Co-authored-by: trailers (AI tools, configurable)
      - Invisible / non-standard Unicode space characters
      - Ambiguous Unicode characters that look like ASCII
      - Invalid UTF-8 byte sequences
      - Conventional commit format (when enabled)

    With --fix, auto-fixable violations (all except language checks) are
    corrected in place before the commit proceeds.
cmd.prepare_msg.short:
  other: "Add policy hints to the commit message template (prepare-commit-msg hook)"
cmd.prepare_msg.long:
  other: |-
    Appends config-based policy hints to the end of the commit message file
    as # comment lines. Git strips lines starting with # at commit time,
    so the hints never end up in the actual commit message.

    Does nothing when source is message (-m/-F), merge, squash, or
    commit (amend) — the user already has a message in those cases.

    Use as a git prepare-commit-msg hook via lefthook, husky, or similar:
      prepare-commit-msg:
        commands:
          policy-hint:
            run: commit-checker prepare-msg {1} {2} {3}
cmd.prepare_msg.hint_header:
  other: "── commit-checker policy guide ──"
cmd.prepare_msg.hint_format:
  other: "Format: <type>(<scope>): <description>"
cmd.prepare_msg.hint_types:
  other: "Allowed types: {{.Types}}"
cmd.prepare_msg.hint_language:
  other: "Write the commit message in {{.Language}}"
cmd.prepare_msg.hint_coauthor:
  other: "AI co-author trailers will be removed before commit"

