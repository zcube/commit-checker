lang.japanese:
  other: "Japanese"
lang.chinese:
  other: "Chinese"
cmd.fix.short:
  other: "Auto-fix Unicode issues in staged files"
cmd.fix.long:
  other: |-
    Scans staged files for auto-fixable Unicode issues and corrects them in place.

    Auto-fixable issues:
      - Invisible / non-standard Unicode space characters (replaced or removed)
      - Ambiguous Unicode characters that look like ASCII (replaced with ASCII)
      - Invalid UTF-8 byte sequences (removed)

    Fixed files are automatically re-staged with git add.

    Examples:
      commit-checker fix             # fix staged files
      commit-checker fix --dry-run   # preview fixes without writing changes
cmd.clean.short:
  other: "Clean untracked files inside build artifact / cache directories"
cmd.clean.long:
  other: |-
    Scan the current git repository for build artifact / cache directories
    (node_modules, dist, build, target, __pycache__, .venv, etc.).

    Detection uses parent-dir indicators (go.mod, package.json, Cargo.toml, …)
    so false positives are minimised.

    Tracked files are never deleted — only files reported by
    `git ls-files --others` are eligible.

    Examples:
      commit-checker clean              # list found dirs (dry-run)
      commit-checker clean --yes        # actually delete untracked files
cmd.clean.scanning:
  other: "Scanning: {{.Path}}"
cmd.clean.no_cache_dirs:
  other: "No cache / build directories found."
cmd.clean.found_header:
  other: "Found {{.Count}} cache / build directories (total {{.Size}}):"
cmd.clean.entry:
  other: "  {{.Path}}  ({{.Size}}{{.Tracked}})"
cmd.clean.entry_tracked:
  other: ", {{.Count}} tracked files ⚠"
cmd.clean.dry_run_hint:
  other: "\nUse --yes to delete untracked files."
cmd.clean.cleaned_summary:
  other: "Cleaned {{.Size}} ({{.Count}} dirs)"
cmd.clean.not_in_repo:
  other: "not a git repository: {{.Path}}"
cmd.push.short:
  other: "Check commit messages for commits about to be pushed"
cmd.push.long:
  other: |-
    Reads commit information from stdin (git pre-push hook format) and checks
    each commit message against configured policies.

    Use as a git pre-push hook via lefthook, husky, or similar tools:
      pre-push:
        commands:
          check-commits:
            run: commit-checker push

    Or check a specific range manually:
      commit-checker push --range origin/main..HEAD
cmd.validate.short:
  other: "Validate the configuration file"
cmd.validate.long:
  other: "Check the configuration file for errors and potential issues."
cmd.init.short:
  other: "Generate default configuration file"
cmd.init.long:
  other: |-
    Generate a default .commit-checker.yml configuration file in the current directory.

    Use --lang to set the locale (ko, en, ja, zh). If not specified, the system locale is detected automatically.
    Use --force to overwrite an existing file.
cmd.migrate.short:
  other: "Migrate config file to the latest schema"
cmd.migrate.long:
  other: |-
    Detect the schema version of the config file and migrate it to the latest format.

    Old field names are automatically renamed and deprecated fields are removed.
    Comments and formatting are preserved during migration.

    Use --dry-run to preview changes without modifying the file.
cmd.analyze.short:
  other: "Analyze repository and detect languages and lint configurations"
cmd.analyze.long:
  other: |-
    Scans the current repository to detect programming languages used,
    checks for existing lint configurations, and reports recommendations.
cmd.version.short:
  other: "Print version information"

