# command descriptions
cmd.root.short:
  other: "Git commit checker for code quality and standards"
cmd.root.long:
  other: |-
    A tool to enforce commit message and code comment standards in git repositories.
    Integrates with lefthook, husky, and other git hook managers.
cmd.run.short:
  other: "Check all tracked files for policy compliance"
cmd.run.long:
  other: |-
    Reads all files tracked by git (git ls-files) and checks:
    - binary file detection
    - file encoding (UTF-8)
    - data file lint (YAML, JSON/JSON5, XML)
    - .editorconfig compliance
    - comment language compliance

    Unlike 'diff', this command checks all files regardless of staged state.
cmd.diff.short:
  other: "Check staged diff for policy compliance"
cmd.diff.long:
  other: |-
    Reads the current staged changes (git diff --staged) and checks:
    - binary file detection
    - file encoding (UTF-8)
    - data file lint (YAML, JSON/JSON5, XML)
    - .editorconfig compliance
    - comment language compliance
cmd.msg.short:
  other: "Check commit message for violations"
cmd.msg.long:
  other: |-
    Reads the commit message file and checks for:
      - Co-authored-by: trailers (AI tools, configurable)
      - Invisible / non-standard Unicode space characters
      - Ambiguous Unicode characters that look like ASCII
      - Invalid UTF-8 byte sequences
      - Conventional commit format (when enabled)

    With --fix, auto-fixable violations (all except language checks) are
    corrected in place before the commit proceeds.
cmd.fix.short:
  other: "Rewrite git history to fix commit message violations"
cmd.fix.long:
  other: |-
    Scans commits for message policy violations and rewrites them automatically.

    Auto-fixable violations:
      - Co-authored-by: trailers (removed)
      - Invisible / non-standard Unicode space characters (replaced or removed)
      - Ambiguous Unicode characters that look like ASCII (replaced with ASCII)
      - Invalid UTF-8 byte sequences (removed)

    Language violations in commit bodies are reported but NOT auto-fixed.

    Examples:
      commit-checker fix --dry-run                   # preview fixes for all commits
      commit-checker fix --range HEAD~5..HEAD        # fix last 5 commits
      commit-checker fix --mine --dry-run            # preview fixes for your commits
      commit-checker fix --range main..HEAD          # fix commits not yet in main
cmd.validate.short:
  other: "Validate the configuration file"
cmd.validate.long:
  other: "Check the configuration file for errors and potential issues."
cmd.init.short:
  other: "Generate default configuration file"
cmd.init.long:
  other: |-
    Generate a default .commit-checker.yml configuration file in the current directory.

    Use --lang to set the locale (ko, en, ja, zh). If not specified, the system locale is detected automatically.
    Use --force to overwrite an existing file.
cmd.migrate.short:
  other: "Migrate config file to the latest schema"
cmd.migrate.long:
  other: |-
    Detect the schema version of the config file and migrate it to the latest format.

    Old field names are automatically renamed and deprecated fields are removed.
    Comments and formatting are preserved during migration.

    Use --dry-run to preview changes without modifying the file.
cmd.analyze.short:
  other: "Analyze repository and detect languages and lint configurations"
cmd.analyze.long:
  other: |-
    Scans the current repository to detect programming languages used,
    checks for existing lint configurations, and reports recommendations.
cmd.version.short:
  other: "Print version information"

