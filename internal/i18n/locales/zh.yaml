# 命令描述
cmd.root.short:
  other: "用于代码质量和规范的Git提交检查器"
cmd.root.long:
  other: |-
    用于在git仓库中强制执行提交消息和代码注释标准的工具。
    与lefthook、husky等git钩子管理器集成。
cmd.run.short:
  other: "检查所有跟踪文件的策略合规性"
cmd.run.long:
  other: |-
    读取git(git ls-files)跟踪的所有文件并检查:
    - 二进制文件检测
    - 文件编码 (UTF-8)
    - 数据文件lint (YAML, JSON/JSON5, XML)
    - .editorconfig合规性
    - 注释语言合规性

    与'diff'不同，此命令检查所有文件，无论是否已暂存。
cmd.diff.short:
  other: "检查 diff 的策略合规性 (支持 CI 用 from..to 比较)"
cmd.diff.long:
  other: |-
    使用与 git diff 兼容的参数格式检查代码策略。

    无参数时检查暂存的更改 (HEAD ↔ index)。其他比较使用与 git diff
    相同的语法:

      commit-checker diff                  # 默认: 暂存
      commit-checker diff --staged         # 显式暂存 (--cached 同义)
      commit-checker diff HEAD             # HEAD ↔ working tree
      commit-checker diff origin/main      # origin/main ↔ working tree
      commit-checker diff A B              # A ↔ B
      commit-checker diff A..B             # A ↔ B (range 表示)
      commit-checker diff A...B            # merge-base(A,B) ↔ B

    检查项:
    - 二进制文件策略 (block/allow/lfs)
    - 文件编码 (UTF-8)
    - 数据文件 lint
    - .editorconfig 合规性
    - 注释语言合规性
    - append-only 路径 / 缓存目录等
cmd.msg.short:
  other: "检查提交消息是否存在违规"
cmd.msg.long:
  other: |-
    读取提交消息文件并检查:
      - Co-authored-by: 尾部标记 (AI工具，可配置)
      - 不可见/非标准Unicode空格字符
      - 看起来像ASCII的模糊Unicode字符
      - 无效的UTF-8字节序列
      - 约定式提交格式 (启用时)

    使用--fix时，可自动修复的违规(除语言检查外)将在提交前就地修正。
cmd.fix.short:
  other: "自动修复已暂存文件中的Unicode问题"
cmd.fix.long:
  other: |-
    扫描已暂存文件中可自动修复的Unicode问题并就地修正。

    可自动修复的问题:
      - 不可见/非标准Unicode空格字符 (替换或删除)
      - 看起来像ASCII的模糊Unicode字符 (替换为ASCII)
      - 无效的UTF-8字节序列 (删除)

    修复的文件将自动重新暂存。

    示例:
      commit-checker fix             # 修复已暂存文件
      commit-checker fix --dry-run   # 预览修复内容而不保存更改
cmd.clean.short:
  other: "清理构建产物·缓存目录中的未追踪文件"
cmd.clean.long:
  other: |-
    扫描当前 git 仓库以查找构建产物·缓存目录
    (node_modules, dist, build, target, __pycache__, .venv 等)。

    通过父目录指示器(go.mod, package.json, Cargo.toml 等)进行验证，
    误报较少。

    git 追踪的文件绝不会被删除 — 仅删除 `git ls-files --others`
    报告的未追踪文件。

    示例:
      commit-checker clean              # 仅显示发现项 (dry-run)
      commit-checker clean --yes        # 实际删除未追踪文件
cmd.clean.scanning:
  other: "扫描中: {{.Path}}"
cmd.clean.no_cache_dirs:
  other: "未发现缓存·构建目录。"
cmd.clean.found_header:
  other: "发现 {{.Count}} 个缓存·构建目录 (总计 {{.Size}}):"
cmd.clean.entry:
  other: "  {{.Path}}  ({{.Size}}{{.Tracked}})"
cmd.clean.entry_tracked:
  other: ", git 追踪文件 {{.Count}} 个 ⚠"
cmd.clean.dry_run_hint:
  other: "\n使用 --yes 标志可删除未追踪文件。"
cmd.clean.cleaned_summary:
  other: "已清理 {{.Size}} ({{.Count}} 个目录)"
cmd.clean.not_in_repo:
  other: "不是 git 仓库: {{.Path}}"
cmd.push.short:
  other: "检查即将推送的提交消息"
cmd.push.long:
  other: |-
    读取git pre-push钩子格式的stdin，并根据配置策略检查每个提交消息。

    通过lefthook、husky等工具作为git pre-push钩子使用:
      pre-push:
        commands:
          check-commits:
            run: commit-checker push

    或直接指定特定范围:
      commit-checker push --range origin/main..HEAD
cmd.validate.short:
  other: "验证配置文件"
cmd.validate.long:
  other: "检查配置文件是否存在错误和潜在问题。"
cmd.init.short:
  other: "生成默认配置文件"
cmd.init.long:
  other: |-
    在当前目录生成默认的.commit-checker.yml配置文件。

    使用--lang设置语言环境 (ko, en, ja, zh)。如果未指定，系统语言环境将自动检测。
    使用--force覆盖现有文件。
cmd.migrate.short:
  other: "将配置文件迁移到最新架构"
cmd.migrate.long:
  other: |-
    检测配置文件的架构版本并迁移到最新格式。

    旧字段名称会自动重命名，已弃用的字段会被删除。
    迁移过程中保留注释和格式。

    使用--dry-run可以在不修改文件的情况下预览更改。
cmd.analyze.short:
  other: "分析仓库并检测语言和Lint配置"
cmd.analyze.long:
  other: |-
    扫描当前仓库以检测使用的编程语言，
    检查现有lint配置，并报告建议。
cmd.version.short:
  other: "输出版本信息"

