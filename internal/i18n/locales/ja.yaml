# コマンド説明
cmd.root.short:
  other: "コード品質と標準のためのGitコミットチェッカー"
cmd.root.long:
  other: |-
    gitリポジトリでコミットメッセージとコードコメントの基準を強制するツールです。
    lefthook、huskyなどのgitフック管理ツールと統合されます。
cmd.run.short:
  other: "追跡されたすべてのファイルのポリシー準拠をチェックします"
cmd.run.long:
  other: |-
    git(git ls-files)が追跡するすべてのファイルを読み込み、以下を検査します:
    - バイナリファイル検出
    - ファイルエンコーディング (UTF-8)
    - データファイルlint (YAML, JSON/JSON5, XML)
    - .editorconfig準拠
    - コメント言語準拠

    'diff'と異なり、ステージング状態に関わらずすべてのファイルをチェックします。
cmd.diff.short:
  other: "ステージングされた差分のポリシー準拠をチェックします"
cmd.diff.long:
  other: |-
    現在のステージングされた変更(git diff --staged)を読み込み、以下を検査します:
    - バイナリファイル検出
    - ファイルエンコーディング (UTF-8)
    - データファイルlint (YAML, JSON/JSON5, XML)
    - .editorconfig準拠
    - コメント言語準拠
cmd.msg.short:
  other: "コミットメッセージの違反をチェックします"
cmd.msg.long:
  other: |-
    コミットメッセージファイルを読み込み、以下を検査します:
      - Co-authored-by: トレーラー (AIツール、設定可能)
      - 不可視/非標準Unicodeスペース文字
      - ASCIIに似た紛らわしいUnicode文字
      - 不正なUTF-8バイトシーケンス
      - Conventional commitフォーマット (有効時)

    --fixを使用すると、自動修正可能な違反(言語チェック以外)が
    コミット前にファイル内で修正されます。
cmd.fix.short:
  other: "ステージ済みファイルのUnicode問題を自動修正します"
cmd.fix.long:
  other: |-
    ステージ済みファイルの自動修正可能なUnicode問題をスキャンして修正します。

    自動修正可能な問題:
      - 不可視/非標準Unicodeスペース文字 (置換または削除)
      - ASCIIに似た紛らわしいUnicode文字 (ASCIIに置換)
      - 不正なUTF-8バイトシーケンス (削除)

    修正されたファイルは自動的に再ステージされます。

    例:
      commit-checker fix             # ステージ済みファイルを修正
      commit-checker fix --dry-run   # 変更を保存せずにプレビュー
cmd.push.short:
  other: "プッシュされるコミットのメッセージを検査します"
cmd.push.long:
  other: |-
    git pre-pushフック形式のstdinを読み込み、各コミットメッセージを
    設定されたポリシーに従って検査します。

    lefthook、huskyなどでgit pre-pushフックとして使用してください:
      pre-push:
        commands:
          check-commits:
            run: commit-checker push

    または特定の範囲を直接指定できます:
      commit-checker push --range origin/main..HEAD
cmd.validate.short:
  other: "設定ファイルを検証します"
cmd.validate.long:
  other: "設定ファイルのエラーと潜在的な問題を確認します。"
cmd.init.short:
  other: "デフォルト設定ファイルを生成します"
cmd.init.long:
  other: |-
    現在のディレクトリにデフォルトの.commit-checker.yml設定ファイルを生成します。

    --langでロケールを設定できます (ko, en, ja, zh)。指定しない場合、システムロケールが自動的に検出されます。
    --forceで既存のファイルを上書きできます。
cmd.migrate.short:
  other: "設定ファイルを最新スキーマに移行します"
cmd.migrate.long:
  other: |-
    設定ファイルのスキーマバージョンを検出し、最新フォーマットに移行します。

    古いフィールド名は自動的に変更され、廃止されたフィールドは削除されます。
    移行中にコメントとフォーマットが保持されます。

    --dry-runでファイルを変更せずに変更内容をプレビューできます。
cmd.analyze.short:
  other: "リポジトリを分析して言語とLint設定を検出します"
cmd.analyze.long:
  other: |-
    現在のリポジトリをスキャンして使用されているプログラミング言語を検出し、
    既存のlint設定を確認して、推奨事項を報告します。
cmd.version.short:
  other: "バージョン情報を表示"

