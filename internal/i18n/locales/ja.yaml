config.type_error_object_required:
  other: "  - {{.Line}}行目: '{{.Field}}' フィールドには {{.Type}}({{.Value}}) ではなくオブジェクト形式が必要です。"
config.type_error_example_header:
  other: "    正しい形式の例:"
config.type_error_example_line:
  other: "      {{.Line}}"
config.type_error_generic:
  other: "  - {{.Line}}行目: {{.GoType}} 型に {{.Type}} 値({{.Value}})は使用できません。"

